<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Your Cart | Avani Turmeric</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Custom Styles -->
  <link href="style.css" rel="stylesheet">

  <style>
    /* Page-specific styles */
    .qty-input {
      max-width: 90px;
      text-align: center;
    }

    .cart-item-card {
      background: white;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      border: 3px solid var(--primary-amber);
      transition: all var(--transition-base);
      overflow: hidden;
    }

    .cart-item-card:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow-xl);
    }

    .total-card {
      background: var(--gradient-primary);
      border: none;
      color: #000;
    }
  </style>
</head>

<body>

  <!-- Page Loader -->
  <div class="page-loader">
    <img src="logo.jpg" height="100" class="rounded-circle loader-logo" alt="Loading...">
  </div>

  <div class="container my-5 scale-in">

    <h2 class="text-center fw-bold mb-4">
      <i class="bi bi-cart4"></i> Your Cart
    </h2>

    <!-- CART ITEM CARD -->
    <div class="cart-item-card mb-4 fade-in-up">
      <div class="card-body p-4">

        <div class="row align-items-center text-center text-md-start">

          <!-- Product Info -->
          <div class="col-md-4 mb-3 mb-md-0">
            <h5 class="fw-bold mb-1" id="productName"></h5>
            <p class="text-muted mb-0">
              Price per Kg: ₹ <span id="pricePerKg">0</span>
            </p>

          </div>

          <!-- Quantity -->
          <div class="col-md-4 mb-3 mb-md-0">
            <label class="fw-semibold mb-1 d-block">Quantity (Kg)</label>

            <input type="number" id="quantity" class="form-control qty-input mx-auto mx-md-0 border-dark border-2"
              min="0.5" step="0.5" onchange="updateTotal()">

            <small class="text-danger d-none" id="qtyError">
              Minimum quantity is 0.5 Kg
            </small>
          </div>

          <!-- Total -->
          <div class="col-md-4">
            <h5 class="fw-bold price-display">
              Total: ₹ <span id="itemTotal">0</span>
            </h5>
          </div>


        </div>

      </div>
    </div>

    <!-- GRAND TOTAL -->
    <div class="total-card shadow rounded-4 mb-4 fade-in-up" style="animation-delay: 0.1s;">
      <div class="card-body text-end p-4">
        <h4 class="fw-bold">
          Grand Total: ₹ <span id="grandTotal">0</span>
        </h4>
      </div>
    </div>

    <!-- ACTION BUTTON -->
    <div class="text-center mt-4 fade-in-up" style="animation-delay: 0.2s;">
      <button class="btn btn-warning fw-bold px-5 py-3" onclick="proceedToCheckout()">
        <i class="bi bi-check-circle"></i> Proceed to Checkout
      </button>
    </div>

  </div>




  <footer id="contact" class="bg-dark text-white text-center p-5 mt-1 scroll-animate">
    <h1 class="brand-footer">Avani Turmerics</h1>
    <br>


    <br>
    <div class="d-flex justify-content-center gap-3 mb-3 flex-wrap p-2">
      <a href="https://wa.me/919822979272" class="social-btn btn btn-warning" target="_blank" aria-label="WhatsApp">
        <i class="bi bi-whatsapp"></i>
      </a>

      <a href="https://instagram.com/nickx__.__" class="social-btn btn btn-warning" target="_blank"
        aria-label="Instagram">
        <i class="bi bi-instagram"></i>
      </a>

      <a href="mailto:khatkenikhil2003@gmail.com" class="social-btn btn btn-warning" aria-label="Email">
        <i class="bi bi-envelope-fill"></i>
      </a>
    </div>

    <p class="mb-0 ">
      <i class="bi bi-heart-fill text-danger"></i>
      Built By Nikhil Khatke
    </p>


  </footer>




  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Custom Animations -->
  <script src="animations.js"></script>

  <!-- CART LOGIC -->
  <script>
    let pricePerKg = 0;

    window.onload = function () {
      fetch("viewCart")
        .then(res => res.json())
        .then(data => {

          // ✅ FIX: handle array
          if (!data || data.length === 0) {
            alert("Your cart is empty");
            return;
          }

          const item = data[0]; // take first cart item

          pricePerKg = item.pricePerKg;

          document.getElementById("productName").innerText = item.productName;
          document.getElementById("pricePerKg").innerText = pricePerKg;
          document.getElementById("quantity").value = item.quantity;

          document.getElementById("itemTotal").innerText =
            item.totalAmount.toFixed(2);

          document.getElementById("grandTotal").innerText =
            item.totalAmount.toFixed(2);
        });
    };

    function updateTotal() {
      const qtyInput = document.getElementById("quantity");
      const qty = parseFloat(qtyInput.value);
      const error = document.getElementById("qtyError");

      if (isNaN(qty) || qty < 0.5) {
        error.classList.remove("d-none");
        document.getElementById("itemTotal").innerText = "0";
        document.getElementById("grandTotal").innerText = "0";
        return;
      }

      error.classList.add("d-none");

      const total = qty * pricePerKg;
      document.getElementById("itemTotal").innerText = total.toFixed(2);
      document.getElementById("grandTotal").innerText = total.toFixed(2);
    }

    function proceedToCheckout() {
      const qty = document.getElementById("quantity").value;

      if (qty < 0.5) {
        alert("Quantity must be at least 0.5 Kg");
        return;
      }

      window.location.href = "customer-details.html";
    }
  </script>


</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Customer Details | Avani Turmeric</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Custom Styles -->
  <link href="style.css" rel="stylesheet">

  <style>
    /* Page-specific styles */
    .form-card {
      background: white;
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-xl);
      border: 3px solid var(--primary-amber);
    }
  </style>
</head>

<body>

  <!-- Page Loader -->
  <div class="page-loader">
    <img src="logo.jpg" height="100" class="rounded-circle loader-logo" alt="Loading...">
  </div>

  <!-- Header note (simple for now) -->
  <div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh; padding: 2rem 0;">

    <div class="form-card p-4 scale-in" style="max-width: 500px; width: 100%;">

      <h3 class="text-center fw-bold mb-4">
        <i class="bi bi-person-check"></i>
        Customer Details
      </h3>

      <!-- Customer Form -->
      <form action="placeOrder" method="post">

        <!-- Full Name -->
        <div class="mb-3">
          <label class="form-label fw-semibold">Full Name</label>
          <input type="text" name="fullName" class="form-control" placeholder="Enter full name" required>
        </div>

        <!-- Address -->
        <div class="mb-3">
          <label class="form-label fw-semibold">Address</label>
          <textarea name="address" class="form-control" rows="3" placeholder="Enter delivery address"
            required></textarea>
        </div>

        <!-- City -->
        <div class="mb-3">
          <label class="form-label fw-semibold">City</label>
          <input type="text" name="city" class="form-control" placeholder="Enter city" required>
        </div>

        <!-- State -->
        <div class="mb-3">
          <label class="form-label fw-semibold">State</label>
          <input type="text" name="state" class="form-control" placeholder="Enter state" required>
        </div>

        <!-- Pin Code -->
        <div class="mb-4">
          <label class="form-label fw-semibold">Pin Code</label>
          <input type="text" name="pincode" class="form-control" placeholder="6-digit pin code" pattern="[0-9]{6}"
            required>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn btn-warning fw-bold w-100 py-3">
          <i class="bi bi-bag-check"></i>
          Place Order
        </button>

      </form>

    </div>
  </div>


  <footer id="contact" class="bg-dark text-white text-center p-5 mt-1 scroll-animate">
    <h1 class="brand-footer">Avani Turmerics</h1>
    <br>


    <br>
    <div class="d-flex justify-content-center gap-3 mb-3 flex-wrap p-2">
      <a href="https://wa.me/919822979272" class="social-btn btn btn-warning" target="_blank" aria-label="WhatsApp">
        <i class="bi bi-whatsapp"></i>
      </a>

      <a href="https://instagram.com/nickx__.__" class="social-btn btn btn-warning" target="_blank"
        aria-label="Instagram">
        <i class="bi bi-instagram"></i>
      </a>

      <a href="mailto:khatkenikhil2003@gmail.com" class="social-btn btn btn-warning" aria-label="Email">
        <i class="bi bi-envelope-fill"></i>
      </a>
    </div>

    <p class="mb-0 ">
      <i class="bi bi-heart-fill text-danger"></i>
      Built By Nikhil Khatke
    </p>


  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Custom Animations -->
  <script src="animations.js"></script>

</body>

</html>

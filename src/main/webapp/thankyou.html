<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Order Placed | Avani Turmerics</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Custom Styles -->
  <link href="style.css" rel="stylesheet">

  <style>
    .thankyou-card {
      max-width: 600px;
      margin: auto;
      margin-top: 12vh;
      padding: 3rem;
      border-radius: var(--radius-xl);
      background: white;
      box-shadow: var(--shadow-xl);
      border: 3px solid var(--primary-amber);
    }

    .success-icon {
      font-size: 5rem;
      color: #10b981;
      animation: successPop 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55) both;
    }

    @keyframes successPop {
      0% {
        transform: scale(0) rotate(0deg);
        opacity: 0;
      }

      50% {
        transform: scale(1.2) rotate(10deg);
      }

      100% {
        transform: scale(1) rotate(0deg);
        opacity: 1;
      }
    }

    .thank-you-text {
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
  </style>
</head>

<body>

  <!-- Page Loader -->
  <div class="page-loader">
    <img src="logo.jpg" height="100" class="rounded-circle loader-logo" alt="Loading...">
  </div>

  <div class="container">
    <div class="thankyou-card text-center scale-in">

      <div class="card-body">
        <div class="mb-4">
          <i class="bi bi-check-circle-fill success-icon"></i>
        </div>

        <h2 class="fw-bold mb-3 thank-you-text">
          Thank You for Your Order!
        </h2>

        <p class="text-muted mb-4">
          Your order has been placed successfully.<br>
          We will contact you shortly for delivery.
        </p>

        <hr>

        <p class="fw-semibold mb-4">
          Avani Turmerics appreciates your trust 🌿
        </p>

        <a href="demo.html" class="btn btn-warning fw-bold px-5 py-3">
          <i class="bi bi-house-door-fill"></i> Back to Home
        </a>
      </div>

    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Custom Animations -->
  <script src="animations.js"></script>

</body>

</html>

<!DOCTYPE html>

<head>
  <meta charset="UTF-8">

  <style>
    /* Page-specific overrides can go here if needed */
  </style>



</head>

<body>

  <!-- Page Loader -->
  <div class="page-loader">
    <img src="logo.jpg" height="100" class="rounded-circle loader-logo" alt="Loading...">
  </div>

  <header>
    <nav class="navbar navbar-dark bg-dark p-2 navbar-expand-lg fixed-top border border-warning border-2 shadow">
      <div class="container">

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainMenu">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainMenu">

          <a class="navbar-brand d-flex flex-column align-items-center" href="#">
            <img src="logo.jpg" height="60" class="rounded-circle">
            <span class="fw-bold mt-1 text-warning">Avani Turmeric</span>
          </a>

          <ul class="navbar-nav ms-auto align-items-center">
            <li class="nav-item"><a class="nav-link" href="demo.html">Home</a></li>
            <li class="nav-item"><a class="nav-link active" href="products.html">Products</a></li>
            <li class="nav-item"><a class="nav-link" href="#contact">Contact</a></li>
          </ul>

          <a href="cart.html" class="btn btn-warning fw-bold bi-cart4 ms-3"> Cart</a>
        </div>
      </div>
    </nav>
  </header>

  <section class="bg-gradient-dark bg-pattern p-4">
    <div class="container d-flex justify-content-center align-items-center min-vh-100">

      <div class="product-card p-4 scale-in" style="max-width: 420px; width: 100%;">

        <div class="img-hover-zoom mb-3">
          <img src="turmeric2.jpg" class="card-img-top rounded-3" alt="Avani Turmeric Powder">
        </div>

        <div class="card-body text-center">

          <h3 class="fw-bold mb-3">Avani Turmeric Powder</h3>

          <!-- ✅ EVERYTHING INSIDE FORM -->
          <form action="addToCart" method="post">

            <!-- REQUIRED DATA -->
            <input type="hidden" name="productId" value="1">
            <input type="hidden" id="pricePerKgInput" name="pricePerKg" value="300">



            <!-- QUANTITY -->
            <div class="mb-3">
              <label class="fw-semibold mb-2">Select Quantity (Kg)</label>

              <div class="input-group justify-content-center">
                <input type="number" id="quantity" name="quantity" class="form-control text-center border-dark border-2"
                  min="0.5" step="0.5" value="1" onchange="calculatePrice()" required style="max-width: 120px;">
                <span class="input-group-text">Kg</span>
              </div>
            </div>

            <!-- PRICE -->
            <div class="mb-4">
              <h5 class="fw-bold price-display">
                Price: ₹ <span id="totalPrice">0</span>
              </h5>
            </div>

            <!-- SUBMIT -->
            <button type="submit" class="btn btn-warning fw-bold w-100 py-2 bi-cart-plus">
              Add to Cart
            </button>

          </form>

        </div>
      </div>
    </div>
  </section>


  <footer id="contact" class="bg-dark text-white text-center p-5 mt-1 scroll-animate">
    <h1 class="brand-footer">Avani Turmerics</h1>
    <br>


    <br>
    <div class="d-flex justify-content-center gap-3 mb-3 flex-wrap p-2">
      <a href="https://wa.me/919822979272" class="social-btn btn btn-warning" target="_blank" aria-label="WhatsApp">
        <i class="bi bi-whatsapp"></i>
      </a>

      <a href="https://instagram.com/nickx__.__" class="social-btn btn btn-warning" target="_blank"
        aria-label="Instagram">
        <i class="bi bi-instagram"></i>
      </a>

      <a href="mailto:khatkenikhil2003@gmail.com" class="social-btn btn btn-warning" aria-label="Email">
        <i class="bi bi-envelope-fill"></i>
      </a>
    </div>

    <p class="mb-0 ">
      <i class="bi bi-heart-fill text-danger"></i>
      Built By Nikhil Khatke
    </p>


  </footer>




  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Custom Animations -->
  <script src="animations.js"></script>

  <script>

    let pricePerKg = 300;
    const productId = 1;

    window.onload = function () {
      fetch("getProductPrice?productId=" + productId)
        .then(res => res.text())
        .then(price => {
          pricePerKg = parseFloat(price);
          document.getElementById("pricePerKgInput").value = pricePerKg;
          calculatePrice();
        });
    };

    function calculatePrice() {
      const qty = document.getElementById("quantity").value;
      const total = qty * pricePerKg;
      document.getElementById("totalPrice").innerText = total.toFixed(2);
    }

  </script>

</body>

</html>
